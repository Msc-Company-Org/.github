name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance-files:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate shared community files
        run: |
          test -f .editorconfig
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f PULL_REQUEST_TEMPLATE.md
          test -f .github/ISSUE_TEMPLATE/bug.yml
          test -f .github/ISSUE_TEMPLATE/feature.yml
          test -f profile/README.md
